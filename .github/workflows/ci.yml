name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run check
        run: npm run check

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Export browser deck PDF
        run: npm run export-deck

      - name: Verify deck PDF
        run: test -f public/deck.pdf && echo "deck.pdf exists ($(wc -c < public/deck.pdf) bytes)"

      - name: Upload deck PDF
        uses: actions/upload-artifact@v4
        with:
          name: investor-deck
          path: public/deck.pdf
